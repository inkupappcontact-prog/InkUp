<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkUp - La Révolution de la BD Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        body {
            /* Police Style BD Franco-Belge */
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #000000;
            /* Contraste optimal : Blanc sur Noir */
            color: #FFFFFF;
            
            /* Recommandation Expert : Lisibilité et Style Manuscrit */
            line-height: 1.6;
            letter-spacing: -0.015em;
        }
        h1, h2, h3, h4, .comic-title {
            font-family: 'Bangers', system-ui;
            /* Recommandation Expert : Impact Visuel */
            letter-spacing: 0.05em;
            line-height: 1.1;
        }
        .comic-border {
            border: 3px solid #2563EB;
        }
        .comic-shadow {
            box-shadow: 6px 6px 0px 0px #2563EB;
        }
        .comic-shadow-sm {
            box-shadow: 3px 3px 0px 0px #2563EB;
        }
        .skew-negative {
            transform: skewX(-12deg);
        }
        .unskew {
            transform: skewX(12deg);
        }
        /* Custom halftone pattern for background flair */
        .halftone {
            background-image: radial-gradient(#2563EB 10%, transparent 11%);
            background-size: 15px 15px;
            opacity: 0.05;
        }
    </style>
