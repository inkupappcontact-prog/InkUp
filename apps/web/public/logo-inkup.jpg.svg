<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="logoPattern" x="0" y="0" width="100%" height="100%" patternUnits="userSpaceOnUse">
      <image href="data:image/jpeg;base64," width="500" height="500" />
    </pattern>
  </defs>
  
  <!-- Rectangle avec le pattern de l'image -->
  <rect width="500" height="500" fill="url(#logoPattern)" />
</svg>
