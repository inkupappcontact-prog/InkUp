<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        body {
            /* Police Style BD Franco-Belge (Lettrage bulle) */
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #FFFFFF;
            /* Accessibilité : Gris Anthracite (#1A1A1A) sur Blanc (#FFFFFF) = Ratio 19.5:1 (Conforme AAA) */
            color: #1A1A1A;
            
            /* RECOMMANDATION EXPERT : Lisibilité et Style Manuscrit */
            line-height: 1.6;        /* Donne de l'air au texte courant */
            letter-spacing: -0.015em; /* Légèrement serré pour imiter l'écriture manuelle */
        }
        h1, h2, h3, h4, .comic-title {
            font-family: 'Bangers', system-ui;
            /* RECOMMANDATION EXPERT : Impact Visuel */
            letter-spacing: 0.05em;  /* Les titres gras ont besoin de respirer */
            line-height: 1.1;        /* Les titres doivent rester compacts */
        }
        .comic-border {
            border: 3px solid #000000;
        }
        .comic-shadow {
            box-shadow: 6px 6px 0px 0px #000000;
        }
        .comic-shadow-sm {
            box-shadow: 3px 3px 0px 0px #000000;
        }
        .skew-negative {
            transform: skewX(-12deg);
        }
        .unskew {
            transform: skewX(12deg);
        }
        /* Custom halftone pattern for background flair */
        .halftone {
            background-image: radial-gradient(#000 10%, transparent 11%);
            background-size: 15px 15px;
            opacity: 0.05;
        }
    </style>
<script type="importmap">

}

</head>

</html>
